<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>ScoutWire</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & base ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0d0d0d;
      --surface:    #1a1a1a;
      --surface2:   #242424;
      --border:     #2e2e2e;
      --text:       #f0f0f0;
      --text-dim:   #888;
      --accent:     #3b82f6;   /* blue — active/on */
      --green:      #22c55e;   /* listening ON */
      --red:        #ef4444;   /* listening OFF */
      --amber:      #f59e0b;   /* rate-limited answer */
      --copy-flash: #22c55e;
      --radius:     10px;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 16px;
      line-height: 1.5;
      -webkit-tap-highlight-color: transparent;
      letter-spacing: -0.01em;
    }

    /* ── Layout ───────────────────────────────────────────────────── */
    #app {
      max-width: 680px;
      margin: 0 auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-height: 100%;
    }

    /* ── Header ───────────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    .brand {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: .02em;
      color: var(--text);
    }

    .brand span { color: var(--accent); }

    .status-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* WS connection dot */
    #ws-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: var(--red);
      flex-shrink: 0;
      transition: background .3s;
    }
    #ws-dot.connected { background: var(--green); }

    #ws-label {
      font-size: .75rem;
      color: var(--text-dim);
    }

    /* ── Control bar ──────────────────────────────────────────────── */
    #controls {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    #listen-btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, transform .1s;
      background: var(--green);
      color: #000;
      min-height: 48px;
    }

    #listen-btn.active {
      background: var(--red);
      color: #fff;
    }

    #listen-btn:active { transform: scale(.97); }

    .listen-indicator {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: .85rem;
      color: var(--text-dim);
      white-space: nowrap;
    }

    #listen-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--red);
      flex-shrink: 0;
      transition: background .3s;
    }

    #listen-dot.on {
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 4px var(--green); }
      50%       { box-shadow: 0 0 10px var(--green); }
    }

    /* ── Latest answer card ───────────────────────────────────────── */
    #latest-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      display: none;   /* hidden until first answer */
    }

    #latest-card.visible { display: block; }

    #latest-card.rate-limited {
      border-color: var(--amber);
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      font-size: .8rem;
      color: var(--text-dim);
    }

    .card-header .q-num {
      font-weight: 700;
      color: var(--accent);
      font-size: .9rem;
    }

    .rate-badge {
      display: none;
      background: var(--amber);
      color: #000;
      font-size: .7rem;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 4px;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    #latest-card.rate-limited .rate-badge { display: inline-block; }

    .card-body {
      padding: 14px;
    }

    #latest-question {
      font-size: .85rem;
      color: var(--text-dim);
      margin-bottom: 8px;
    }

    #latest-answer {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
      word-break: break-word;
      letter-spacing: -0.02em;
    }

    #latest-card.rate-limited #latest-answer {
      color: var(--amber);
    }

    /* The whole card body is the copy tap-target */
    .copy-area {
      cursor: pointer;
      border-radius: 6px;
      padding: 10px;
      margin: -10px;
      transition: background .15s;
    }

    .copy-area:active,
    .copy-area.flash {
      background: rgba(34,197,94,.15);
    }

    .copy-hint {
      margin-top: 10px;
      font-size: .75rem;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    #copy-confirm {
      color: var(--green);
      font-weight: 600;
      opacity: 0;
      transition: opacity .2s;
    }

    #copy-confirm.show { opacity: 1; }

    /* ── History ──────────────────────────────────────────────────── */
    #history-section {
      flex: 1;
    }

    .section-label {
      font-size: .75rem;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 8px;
      padding: 0 2px;
    }

    #history-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 420px;
      overflow-y: auto;
      padding-right: 2px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    #history-list::-webkit-scrollbar { width: 4px; }
    #history-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .hist-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .hist-item.rate-limited { border-color: var(--amber); }

    .hist-num {
      font-size: .8rem;
      font-weight: 700;
      color: var(--accent);
      min-width: 28px;
      padding-top: 1px;
      flex-shrink: 0;
    }

    .hist-body { flex: 1; min-width: 0; }

    .hist-q {
      font-size: .78rem;
      color: var(--text-dim);
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .hist-a {
      font-size: .92rem;
      font-weight: 500;
      color: var(--text);
      word-break: break-word;
    }

    .hist-item.rate-limited .hist-a { color: var(--amber); }

    .hist-ts {
      font-size: .68rem;
      color: var(--text-dim);
      margin-top: 4px;
    }

    .hist-copy-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-dim);
      border-radius: 6px;
      padding: 5px 8px;
      font-size: .75rem;
      cursor: pointer;
      flex-shrink: 0;
      align-self: center;
      transition: background .15s, color .15s;
      min-width: 44px;
      min-height: 36px;
      text-align: center;
    }

    .hist-copy-btn:active,
    .hist-copy-btn.flash { background: rgba(34,197,94,.2); color: var(--green); }

    #empty-history {
      text-align: center;
      color: var(--text-dim);
      font-size: .85rem;
      padding: 24px 0;
    }
  </style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <header>
    <div class="brand">Scout<span>Wire</span></div>
    <div class="status-row">
      <div id="ws-dot"></div>
      <span id="ws-label">Connecting…</span>
    </div>
  </header>

  <!-- Controls -->
  <div id="controls">
    <button id="listen-btn" onclick="toggleListen()">Start Listening</button>
    <div class="listen-indicator">
      <div id="listen-dot"></div>
      <span id="listen-label">Off</span>
    </div>
  </div>

  <!-- Latest answer card -->
  <div id="latest-card">
    <div class="card-header">
      <span class="q-num" id="latest-num">Q—</span>
      <span id="latest-ts"></span>
      <span class="rate-badge">Rate limited</span>
    </div>
    <div class="card-body">
      <div class="copy-area" id="copy-area" onclick="copyLatest()" title="Tap to copy answer">
        <div id="latest-question"></div>
        <div id="latest-answer"></div>
        <div class="copy-hint">
          <span>⬆ tap to copy</span>
          <span id="copy-confirm">✓ Copied!</span>
        </div>
      </div>
    </div>
  </div>

  <!-- History -->
  <div id="history-section">
    <div class="section-label">History</div>
    <div id="history-list">
      <div id="empty-history">No answers yet — start listening and wait for a question.</div>
    </div>
  </div>

</div>

<script>
// ── State ────────────────────────────────────────────────────────────────
let listening = false;
let latestAnswer = "";
let ws = null;
let wsReconnectTimer = null;
let wsReconnectDelay = 1000; // ms, doubles on each failure up to 16s

// ── Helpers ──────────────────────────────────────────────────────────────

function isRateLimited(answer) {
  return typeof answer === "string" && answer.startsWith("Rate limited");
}

function formatTime(isoStr) {
  // isoStr e.g. "2026-07-02T21:00:00Z"
  try {
    const d = new Date(isoStr);
    return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
  } catch { return isoStr; }
}

async function copyText(text) {
  try {
    await navigator.clipboard.writeText(text);
    return true;
  } catch {
    // Fallback for older mobile browsers
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed";
    ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    const ok = document.execCommand("copy");
    document.body.removeChild(ta);
    return ok;
  }
}

function flashElement(el) {
  el.classList.add("flash");
  setTimeout(() => el.classList.remove("flash"), 400);
}

// ── Listening toggle ──────────────────────────────────────────────────────

async function toggleListen() {
  try {
    const res = await fetch("/toggle", { method: "POST" });
    const data = await res.json();
    setListening(data.listening);
  } catch (err) {
    console.error("Toggle failed:", err);
  }
}

function setListening(val) {
  listening = val;
  const btn   = document.getElementById("listen-btn");
  const dot   = document.getElementById("listen-dot");
  const label = document.getElementById("listen-label");

  if (val) {
    btn.textContent = "Stop Listening";
    btn.classList.add("active");
    dot.classList.add("on");
    label.textContent = "Live";
  } else {
    btn.textContent = "Start Listening";
    btn.classList.remove("active");
    dot.classList.remove("on");
    label.textContent = "Off";
  }
}

// ── Latest answer card ────────────────────────────────────────────────────

function showLatest(entry) {
  latestAnswer = entry.answer;

  const card  = document.getElementById("latest-card");
  const num   = document.getElementById("latest-num");
  const ts    = document.getElementById("latest-ts");
  const q     = document.getElementById("latest-question");
  const a     = document.getElementById("latest-answer");
  const conf  = document.getElementById("copy-confirm");

  num.textContent = entry.number !== null ? `Q${entry.number}` : "Q—";
  ts.textContent  = formatTime(entry.timestamp);
  q.textContent   = entry.question;
  a.textContent   = entry.answer;
  conf.classList.remove("show");

  if (isRateLimited(entry.answer)) {
    card.classList.add("rate-limited");
  } else {
    card.classList.remove("rate-limited");
  }

  card.classList.add("visible");

  // Auto-copy answer to clipboard
  copyText(entry.answer).then(ok => {
    if (ok) {
      flashElement(document.getElementById("copy-area"));
      conf.classList.add("show");
      setTimeout(() => conf.classList.remove("show"), 1800);
    }
  });

  // Chrome notification
  const qLabel = entry.number !== null ? `Q${entry.number}` : "Answer";
  sendNotification(qLabel, entry.answer);

  // Scroll to top so the latest card is always in view on mobile
  window.scrollTo({ top: 0, behavior: "smooth" });
}

async function copyLatest() {
  if (!latestAnswer) return;
  const ok = await copyText(latestAnswer);
  if (ok) {
    flashElement(document.getElementById("copy-area"));
    const conf = document.getElementById("copy-confirm");
    conf.classList.add("show");
    setTimeout(() => conf.classList.remove("show"), 1800);
  }
}

// ── History ───────────────────────────────────────────────────────────────

function prependHistory(entry) {
  const list = document.getElementById("history-list");
  const empty = document.getElementById("empty-history");
  if (empty) empty.remove();

  const rl = isRateLimited(entry.answer);
  const item = document.createElement("div");
  item.className = "hist-item" + (rl ? " rate-limited" : "");
  item.dataset.answer = entry.answer;

  item.innerHTML = `
    <div class="hist-num">${entry.number !== null ? "Q" + entry.number : "Q—"}</div>
    <div class="hist-body">
      <div class="hist-q">${escHtml(entry.question)}</div>
      <div class="hist-a">${escHtml(entry.answer)}</div>
      <div class="hist-ts">${formatTime(entry.timestamp)}</div>
    </div>
    <button class="hist-copy-btn" title="Copy answer">Copy</button>
  `;

  item.querySelector(".hist-copy-btn").addEventListener("click", async (e) => {
    e.stopPropagation();
    const ok = await copyText(entry.answer);
    if (ok) flashElement(e.currentTarget);
  });

  // Newest entries go to the top of history
  list.insertBefore(item, list.firstChild);
}

function appendHistoryOldEntry(entry) {
  // Used when loading existing history on connect — appended at bottom (older)
  const list = document.getElementById("history-list");
  const empty = document.getElementById("empty-history");
  if (empty) empty.remove();

  const rl = isRateLimited(entry.answer);
  const item = document.createElement("div");
  item.className = "hist-item" + (rl ? " rate-limited" : "");
  item.dataset.answer = entry.answer;

  item.innerHTML = `
    <div class="hist-num">${entry.number !== null ? "Q" + entry.number : "Q—"}</div>
    <div class="hist-body">
      <div class="hist-q">${escHtml(entry.question)}</div>
      <div class="hist-a">${escHtml(entry.answer)}</div>
      <div class="hist-ts">${formatTime(entry.timestamp)}</div>
    </div>
    <button class="hist-copy-btn" title="Copy answer">Copy</button>
  `;

  item.querySelector(".hist-copy-btn").addEventListener("click", async (e) => {
    e.stopPropagation();
    const ok = await copyText(entry.answer);
    if (ok) flashElement(e.currentTarget);
  });

  list.appendChild(item);
}

function escHtml(str) {
  return str
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

// ── Initial load ──────────────────────────────────────────────────────────

async function loadStatus() {
  try {
    const res = await fetch("/status");
    const data = await res.json();
    setListening(data.listening);
    // History comes newest-last from the server; render oldest first at bottom.
    data.history.forEach(entry => appendHistoryOldEntry(entry));
    // Show the most recent as the latest card
    if (data.history.length > 0) {
      showLatest(data.history[data.history.length - 1]);
    }
  } catch (err) {
    console.error("Status load failed:", err);
  }
}

// ── WebSocket ─────────────────────────────────────────────────────────────

// Track entries already rendered from history on connect to avoid duplicates
const _seenTimestamps = new Set();

function connectWS() {
  if (wsReconnectTimer) {
    clearTimeout(wsReconnectTimer);
    wsReconnectTimer = null;
  }

  const proto = location.protocol === "https:" ? "wss" : "ws";
  ws = new WebSocket(`${proto}://${location.host}/ws`);

  ws.onopen = () => {
    setWsStatus(true);
    wsReconnectDelay = 1000; // reset backoff
  };

  ws.onmessage = (event) => {
    let entry;
    try { entry = JSON.parse(event.data); } catch { return; }

    // Deduplicate history entries sent on connect vs new live pushes
    if (_seenTimestamps.has(entry.timestamp)) return;
    _seenTimestamps.add(entry.timestamp);

    showLatest(entry);
    prependHistory(entry);
  };

  ws.onclose = () => {
    setWsStatus(false);
    scheduleReconnect();
  };

  ws.onerror = () => {
    setWsStatus(false);
    ws.close();
  };
}

function scheduleReconnect() {
  if (wsReconnectTimer) return;
  wsReconnectTimer = setTimeout(() => {
    wsReconnectTimer = null;
    connectWS();
  }, wsReconnectDelay);
  wsReconnectDelay = Math.min(wsReconnectDelay * 2, 16000); // cap at 16s
}

function setWsStatus(connected) {
  const dot   = document.getElementById("ws-dot");
  const label = document.getElementById("ws-label");
  if (connected) {
    dot.classList.add("connected");
    label.textContent = "Connected";
  } else {
    dot.classList.remove("connected");
    label.textContent = "Reconnecting…";
  }
}

// ── Notifications ─────────────────────────────────────────────────────────

function requestNotificationPermission() {
  if (!("Notification" in window)) return;
  if (Notification.permission === "default") {
    Notification.requestPermission();
  }
}

function sendNotification(title, body) {
  if (!("Notification" in window)) return;
  if (Notification.permission !== "granted") return;
  const n = new Notification(`ScoutWire — ${title}`, {
    body,
    icon: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='16' fill='%233b82f6'/><text x='16' y='21' text-anchor='middle' font-size='16' fill='white'>⚽</text></svg>",
    tag: "scouter-answer",   // replaces previous notification rather than stacking
    silent: false,
  });
  // Auto-close after 6s
  setTimeout(() => n.close(), 6000);
}

// ── Boot ──────────────────────────────────────────────────────────────────

requestNotificationPermission();
loadStatus();
connectWS();
</script>
</body>
</html>
